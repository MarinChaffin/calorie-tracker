            <div className="macro-row"><span className="macro-label">Lipides</span><div className="macro-bar-bg"><div className="macro-bar-fill" style={{width:clamp(fat/dynFatTarget*100)+"%",background:"#f97316"}}/></div><span className="macro-val">{Math.round(fat)}g/{dynFatTarget}g</span></div>
          </div>
        </div>
        <div className="section">
          <div className="input-panel">
            <div className="mode-tabs">
              <button className={"mode-tab"+(inputMode==="text"?" active":"")} onClick={function(){setInputMode("text");}}>✏️ Texte</button>
              <button className={"mode-tab"+(inputMode==="photo"?" active":"")} onClick={function(){setInputMode("photo");}}>📷 Photo</button>
            </div>
            {inputMode==="text"&&<textarea className="textarea" rows="3" placeholder="Ex: 200g poulet, riz, brocolis…" value={textInput} onChange={function(e){setTextInput(e.target.value);}}/>}
            {inputMode==="photo"&&<div>
              {imgPreview?<div><img src={imgPreview} className="photo-preview" alt=""/><textarea className="textarea" rows="2" placeholder="Précision optionnelle…" value={textInput} onChange={function(e){setTextInput(e.target.value);}}/></div>
              :<div className={"photo-drop"+(dragging?" drag":"")} onClick={function(){if(fileRef.current) fileRef.current.click();}}
                onDragOver={function(e){e.preventDefault();setDragging(true);}} onDragLeave={function(){setDragging(false);}}
                onDrop={function(e){e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);}}>
                <div style={{fontSize:26,marginBottom:6}}>📷</div>
                <div style={{fontSize:12,color:"var(--muted)"}}>Glisse ou clique pour ajouter une photo</div>
              </div>}
              <input ref={fileRef} type="file" className="file-input" accept="image/*" capture="environment" onChange={function(e){handleFile(e.target.files[0]);}}/>
            </div>}
            <button className="btn-main" disabled={loadingFood||(!textInput.trim()&&!imgB64)} onClick={handleAnalyzeFood}>
              {loadingFood?<span><span className="spinner"/> Analyse…</span>:"✦ Analyser avec l'IA"}
            </button>
            {aiFood&&<div className="ai-result">
              <div className="ai-result-tag">IA · confiance {aiFood.confidence}</div>
              <div className="ai-result-name">{aiFood.name}</div>
              <div className="ai-result-macros">{aiFood.kcal} kcal · P {aiFood.protein_g}g · G {aiFood.carbs_g}g · L {aiFood.fat_g}g</div>
              {aiFood.note&&<div style={{fontSize:11,color:"var(--muted)",marginBottom:9}}>{aiFood.note}</div>}
              <div className="ai-actions">
                <button className="btn-add" onClick={function(){addMeal(aiFood);}}>Ajouter au journal</button>
                <button className="btn-secondary" onClick={function(){setAiFood(null);}}>Annuler</button>
              </div>
            </div>}
          </div>
        </div>
        <div className="section">
          <div className="section-label">Repas ({todayMeals.length})</div>
          {todayMeals.length===0?<div className="empty-state">Aucun repas enregistré.<br/>Décris ou photographie ton plat ci-dessus.</div>
          :todayMeals.map(function(m){return(
            <div key={m.id} className="meal-entry">
              <span className="meal-icon">{MEAL_ICONS[m.meal_type]||"🍽️"}</span>
              <div className="meal-info"><div className="meal-name">{m.name}</div><div className="meal-detail">P {Math.round(m.protein_g||0)}g · G {Math.round(m.carbs_g||0)}g · L {Math.round(m.fat_g||0)}g</div></div>
              <span className="meal-kcal">{m.kcal}</span>
              <button className="del-btn" onClick={function(){deleteMeal(m.id);}}>✕</button>
            </div>
          );})}
        </div>
      </div>}

      {tab==="workout"&&<div>
        {aiWorkout&&<div className="section">
          <div className="coach-bubble">
            <div className="coach-tag">🤖 Coach IA · {aiWorkout.performance_score}/10</div>
            <div className="coach-text">{aiWorkout.coach_message}</div>
            {aiWorkout.highlights&&aiWorkout.highlights.length>0&&<div style={{marginTop:10,display:"flex",gap:6,flexWrap:"wrap"}}>{aiWorkout.highlights.map(function(h,i){return <span key={i} className="chip lime">✓ {h}</span>;})}</div>}
            <div className="divider"/>
            <div style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)",textTransform:"uppercase",marginBottom:4}}>Prochaine séance</div>
            <div style={{fontSize:13}}>{aiWorkout.suggestion}</div>
            <div className="divider"/>
            <div style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)",textTransform:"uppercase",marginBottom:4}}>Nutrition post-séance</div>
            <div style={{fontSize:13}}>{aiWorkout.nutrition_advice}</div>
            <div style={{marginTop:10,padding:"8px 12px",background:"var(--blue-dim)",borderRadius:8,fontSize:12}}>🎯 Objectif ajusté à <strong style={{color:"var(--lime)"}}>{aiWorkout.adjusted_target} kcal</strong></div>
          </div>
        </div>}
        {todayWorkouts.length>0&&<div className="section">
          <div className="section-label">Séances du jour</div>
          {todayWorkouts.map(function(w){return(
            <div key={w.id} className="workout-summary">
              <div className="ws-header"><div><div className="ws-title">{w.name}</div><div className="ws-date">{w.duration} min</div></div><span className="chip blue">{w.calories_burned} kcal</span></div>
              <div className="ws-stats">
                <div className="ws-stat"><div className="ws-stat-val">{w.exercises.length}</div><div className="ws-stat-label">Exercices</div></div>
                <div className="ws-stat"><div className="ws-stat-val">{w.exercises.reduce(function(s,e){return s+e.sets.length;},0)}</div><div className="ws-stat-label">Séries</div></div>
                <div className="ws-stat"><div className="ws-stat-val" style={{color:"var(--purple)"}}>{w.analysis&&w.analysis.performance_score||"—"}/10</div><div className="ws-stat-label">Score</div></div>
              </div>
              <div className="ws-ex-list">{w.exercises.map(function(e){return e.name;}).join(" · ")}</div>
            </div>
          );})}
        </div>}
        <div className="section">
          <div className="card">
            <div className="card-title">Nouvelle séance</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input className="textarea" style={{flex:1,padding:"8px 12px",height:"auto"}} placeholder="Nom (ex: Push day)" value={workoutName} onChange={function(e){setWorkoutName(e.target.value);}}/>
              <div style={{display:"flex",alignItems:"center",gap:6,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:10,padding:"0 12px",flexShrink:0}}>
                <input className="set-input" style={{width:44}} type="number" value={workoutDuration} onChange={function(e){setWorkoutDuration(+e.target.value);}}/>
                <span style={{fontSize:11,color:"var(--muted)"}}>min</span>
              </div>
            </div>
            {exercises.map(function(ex,ei){return(
              <div key={ex.id} className="exercise-card">
                <div className="ex-header">
                  <input className="textarea" style={{flex:1,padding:"6px 10px",height:"auto",fontSize:13,fontWeight:500}} placeholder={"Exercice "+(ei+1)} value={ex.name} onChange={function(e){upExName(ex.id,e.target.value);}}/>
                  {exercises.length>1&&<button className="del-btn" style={{marginLeft:8}} onClick={function(){rmEx(ex.id);}}>✕</button>}
                </div>
                <table className="sets-table">
                  <thead><tr><th>Série</th><th>Poids (kg)</th><th>Reps</th><th></th></tr></thead>
                  <tbody>{ex.sets.map(function(s,si){return(
                    <tr key={s.id}>
                      <td><span style={{color:"var(--muted)",fontSize:12}}>{si+1}</span></td>
                      <td><input className="set-input" type="number" placeholder="0" value={s.kg} onChange={function(e){upSet(ex.id,s.id,"kg",e.target.value);}}/></td>
                      <td><input className="set-input" type="number" placeholder="0" value={s.reps} onChange={function(e){upSet(ex.id,s.id,"reps",e.target.value);}}/></td>
                      <td>{ex.sets.length>1&&<button className="rm-set-btn" onClick={function(){rmSet(ex.id,s.id);}}>−</button>}</td>
                    </tr>
                  );})}</tbody>
                </table>
                <button className="add-set-btn" onClick={function(){addSet(ex.id);}}>+ Série</button>
              </div>
            );})}
            <button style={{width:"100%",padding:"10px",borderRadius:10,background:"var(--surface2)",border:"1px dashed var(--border)",color:"var(--muted)",cursor:"pointer",fontSize:13,marginBottom:12}} onClick={addEx}>+ Ajouter un exercice</button>
            <textarea className="textarea" rows="2" placeholder="Notes (RPE, ressenti…)" value={workoutNotes} onChange={function(e){setWorkoutNotes(e.target.value);}} style={{marginBottom:10}}/>
            <button className="btn-main" disabled={loadingWorkout} onClick={handleSaveWorkout}>
              {loadingWorkout?<span><span className="spinner"/> Analyse IA…</span>:"🤖 Enregistrer & analyser"}
            </button>
          </div>
        </div>
      </div>}

      {tab==="goals"&&<div>
        <div className="section">
          <div className="card">
            <div className="card-title">Mon profil</div>
            <div className="goal-row"><span className="goal-label">Âge</span><span className="goal-val">26 ans</span></div>
            <div className="goal-row"><span className="goal-label">Poids</span><span className="goal-val">79.6 kg</span></div>
            <div className="goal-row"><span className="goal-label">Taille</span><span className="goal-val">175 cm</span></div>
            <div className="goal-row"><span className="goal-label">BMR</span><span className="goal-val">{Math.round(BMR)} kcal</span></div>
            <div className="goal-row"><span className="goal-label">TDEE</span><span className="goal-val">{TDEE} kcal</span></div>
          </div>
        </div>
        <div className="section">
          <div className="card">
            <div className="card-title">Objectifs</div>
            <div className="goal-row"><span className="goal-label">Poids cible (kg)</span><input className="goal-input" type="number" value={goals.targetWeight} onChange={function(e){setGoals(function(g){return Object.assign({},g,{targetWeight:+e.target.value});});}}/></div>
            <div className="goal-row"><span className="goal-label">Déficit (kcal/j)</span><input className="goal-input" type="number" value={goals.weeklyDeficit} onChange={function(e){setGoals(function(g){return Object.assign({},g,{weeklyDeficit:+e.target.value});});}}/></div>
            <div className="goal-row"><span className="goal-label">Protéines (g/kg)</span><input className="goal-input" type="number" step="0.1" value={goals.proteinPerKg} onChange={function(e){setGoals(function(g){return Object.assign({},g,{proteinPerKg:+e.target.value});});}}/></div>
            <div className="goal-row"><span className="goal-label">Séances/sem</span><input className="goal-input" type="number" value={goals.sessionsPerWeek} onChange={function(e){setGoals(function(g){return Object.assign({},g,{sessionsPerWeek:+e.target.value});});}}/></div>
            <textarea className="textarea" style={{marginTop:12}} rows="3" placeholder="Contexte pour le coach IA…" value={goals.note} onChange={function(e){setGoals(function(g){return Object.assign({},g,{note:e.target.value});});}}/>
            <button className="btn-main" style={{marginTop:12}} onClick={saveGoals}>Sauvegarder</button>
          </div>
        </div>
        <div className="section">
          <div className="card">
            <div className="card-title">Projections</div>
            <div className="goal-row"><span className="goal-label">Objectif calorique</span><span className="goal-val" style={{color:"var(--lime)"}}>{TDEE-goals.weeklyDeficit} kcal/j</span></div>
            <div className="goal-row"><span className="goal-label">Perte estimée</span><span className="goal-val">{(goals.weeklyDeficit/1100).toFixed(2)} kg/sem</span></div>
            <div className="goal-row"><span className="goal-label">Temps estimé</span><span className="goal-val">{Math.ceil((PROFILE.weight-goals.targetWeight)/(goals.weeklyDeficit/1100))} sem</span></div>
          </div>
        </div>
      </div>}

      {tab==="history"&&<div>
        <div className="section">
          <div className="card">
            <div className="card-title">Évolution du poids</div>
            <div className="weight-input-row">
              <input className="weight-val-input" type="number" step="0.1" placeholder={PROFILE.weight+" kg"} value={weightInput} onChange={function(e){setWeightInput(e.target.value);}}/>
              <button className="btn-log-weight" onClick={logWeight}>⚖️ Logger</button>
            </div>
            <WeightChart entries={weightEntries} targetWeight={goals.targetWeight}/>
          </div>
        </div>
        <div className="section">
          <div className="section-label">Journées ({historyDays.length})</div>
          {historyDays.length===0&&<div className="empty-state">Pas encore d'historique.<br/>Reviens demain ! 😄</div>}
          {historyDays.map(function(d){return <HDay key={d} date={d} dayData={data[d]||{}} onPersistAI={persistAI}/>;  })}
        </div>
      </div>}

      <nav className="bottom-nav">
        {[{id:"today",icon:"🏠",label:"Journal"},{id:"workout",icon:"💪",label:"Sport"},{id:"goals",icon:"🎯",label:"Objectifs"},{id:"history",icon:"📊",label:"Historique"}].map(function(n){return(
          <button key={n.id} className={"nav-btn"+(tab===n.id?" active":"")} onClick={function(){setTab(n.id);}}>
            <span className="nav-icon">{n.icon}</span>
            <span className="nav-label">{n.label}</span>
          </button>
        );})}
      </nav>
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("/calorie-tracker/sw.js");
  });
}
</script>
</body>
</html>
